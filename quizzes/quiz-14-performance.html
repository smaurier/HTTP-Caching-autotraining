<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 14 — Performance & Core Web Vitals</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 14 — Performance & Core Web Vitals</h1>
    <p class="subtitle">LCP, FID/INP, CLS, Lighthouse et impact du caching sur les métriques</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Concept",
        text: "Lequel des Core Web Vitals est le plus directement amélioré par une bonne stratégie de caching HTTP ?",
        code: null,
        options: [
          "CLS (Cumulative Layout Shift) — stabilité visuelle",
          "INP (Interaction to Next Paint) — réactivité aux interactions",
          "LCP (Largest Contentful Paint) — vitesse d'affichage du contenu principal",
          "Les trois sont améliorés de manière égale"
        ],
        answer: 2,
        explanation: "Le LCP mesure le temps d'affichage du plus grand élément visible (image hero, titre principal). Le caching réduit drastiquement le TTFB (time to first byte) : une réponse servie depuis le cache navigateur ou CDN est quasi-instantanée. Un TTFB bas améliore directement le LCP. Le CLS est surtout lié au layout, l'INP à l'exécution JavaScript — moins directement impactés par le cache HTTP."
      },
      {
        label: "Concept",
        text: "Dans un waterfall réseau Lighthouse, que signifie une longue barre « Waiting (TTFB) » sur la requête du document HTML ?",
        code: null,
        options: [
          "Le navigateur attend que JavaScript soit chargé",
          "Le serveur met du temps à générer la réponse (SSR lent, requêtes BDD, etc.) — c'est le temps entre l'envoi de la requête et la réception du premier octet de la réponse",
          "Le DNS est lent à résoudre",
          "Le fichier HTML est trop volumineux"
        ],
        answer: 1,
        explanation: "Le TTFB (Time To First Byte) dans le waterfall représente le temps d'attente côté serveur. Une longue barre TTFB indique que le serveur est lent à répondre (rendu SSR complexe, requêtes BDD, absence de cache). Solutions : cacher la page en CDN (s-maxage), utiliser ISR/SWR, optimiser les requêtes BDD, ajouter un cache Redis applicatif."
      },
      {
        label: "Prédiction",
        text: "Un site charge une image hero (LCP) avec les headers suivants. Quel sera l'impact sur le LCP lors de la seconde visite ?",
        code: "<!-- HTML -->\n<img src=\"/hero.webp\" alt=\"Hero\" fetchpriority=\"high\">\n\n<!-- Headers de /hero.webp -->\nHTTP/1.1 200 OK\nCache-Control: public, max-age=31536000, immutable\nContent-Type: image/webp\nContent-Length: 85000\n\n<!-- Première visite : LCP = 2.4s (réseau 4G) -->\n<!-- Seconde visite : LCP = ? -->",
        options: [
          "LCP identique (~2.4s) car l'image doit être retéléchargée",
          "LCP drastiquement réduit (~0.3-0.5s) car l'image est servie depuis le disk cache sans requête réseau, et immutable empêche même la revalidation",
          "LCP = 0s car l'image apparaît instantanément",
          "LCP légèrement meilleur (~2.0s) grâce au 304"
        ],
        answer: 1,
        explanation: "Avec max-age=31536000 et immutable, l'image est servie depuis le disk cache sans aucune requête réseau (pas même un 304). Le chargement passe de ~2s (réseau 4G) à ~200-500ms (lecture disque + décodage + rendu). Le fetchpriority='high' garantit que le navigateur priorise cette image. Le LCP de la seconde visite est typiquement 4-5x plus rapide."
      },
      {
        label: "Code",
        text: "Ce code analyse les Resource Timing API. Que révèle transferSize === 0 ?",
        code: "// Analyse des performances de cache dans le navigateur\nconst observer = new PerformanceObserver((list) => {\n  for (const entry of list.getEntries()) {\n    if (entry.transferSize === 0 && entry.decodedBodySize > 0) {\n      console.log(`Cache HIT: ${entry.name}`);\n      console.log(`  Durée: ${entry.duration.toFixed(1)}ms`);\n    } else if (entry.transferSize > 0 && entry.transferSize < entry.decodedBodySize) {\n      console.log(`Réseau (compressé): ${entry.name}`);\n      console.log(`  Transfert: ${entry.transferSize}B → ${entry.decodedBodySize}B`);\n    }\n  }\n});\nobserver.observe({ type: 'resource', buffered: true });",
        options: [
          "transferSize === 0 signifie que la requête a échoué",
          "transferSize === 0 avec decodedBodySize > 0 signifie que la ressource a été servie depuis le cache (aucun octet transféré sur le réseau) — c'est un cache HIT",
          "transferSize === 0 signifie que la ressource est vide",
          "transferSize est toujours 0 pour les images"
        ],
        answer: 1,
        explanation: "Dans la Resource Timing API, transferSize = 0 indique qu'aucun octet n'a transité sur le réseau. Si decodedBodySize > 0, la ressource a du contenu mais il vient du cache (memory ou disk). Si les deux sont 0, la requête a été bloquée (CORS) ou la ressource est vide. Ce code permet de mesurer le taux de cache HIT réel des utilisateurs en production (RUM - Real User Monitoring)."
      },
      {
        label: "Pourquoi ?",
        text: "Pourquoi les scores Lighthouse en local diffèrent-ils souvent des performances réelles mesurées par le CrUX (Chrome User Experience Report) ?",
        code: null,
        options: [
          "Parce que Lighthouse utilise un navigateur différent",
          "Parce que Lighthouse simule un appareil et réseau contrôlés (throttling) sans caches réchauffés, alors que les vrais utilisateurs ont des caches navigateur remplis, des connexions variées, et des CDN réchauffés — le cache change radicalement les métriques terrain",
          "Parce que CrUX ne mesure que les utilisateurs Chrome",
          "Parce que Lighthouse est plus ancien que CrUX"
        ],
        answer: 1,
        explanation: "Lighthouse effectue un « cold load » : cache vide, CPU throttlé, réseau simulé. En production (CrUX), beaucoup de visiteurs sont des « retours » avec des caches navigateur remplis, les CDN sont réchauffés (cache HIT), et les conditions réseau varient. Le LCP p75 terrain peut être bien meilleur que Lighthouse si la stratégie de cache est bonne (visiteurs récurrents), ou pire si le CDN a un faible hit ratio."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      answered = false;
      const q = questions[currentQuestion];
      document.getElementById('progressBar').style.width = ((currentQuestion / questions.length) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${questions.length}`;
      let html = `<div class="card"><p class="question-label">${q.label} — Question ${currentQuestion + 1}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q${currentQuestion}" value="${i}"><span>${opt}</span></label></li>`; });
      html += `</ul><div style="margin-top:1rem;"><button class="btn btn-primary" id="validateBtn" onclick="validate()">Valider</button></div><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
    }
    function validate() {
      if (answered) { nextQuestion(); return; }
      const sel = document.querySelector(`input[name="q${currentQuestion}"]:checked`);
      if (!sel) return;
      answered = true;
      const val = parseInt(sel.value), q = questions[currentQuestion], fb = document.getElementById('feedback'), btn = document.getElementById('validateBtn');
      document.querySelectorAll(`input[name="q${currentQuestion}"]`).forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong><br>${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect</strong> — La bonne réponse était : <em>${q.options[q.answer]}</em><br><br>${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function nextQuestion() { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer'); sc.classList.remove('hidden');
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><p class="score-label">${score === questions.length ? 'Parfait ! Excellente maîtrise !' : score >= 3 ? 'Bon travail ! Révisez les points manqués.' : 'Continuez à étudier, vous progresserez !'}</p><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
