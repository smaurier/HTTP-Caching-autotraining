<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 12 — Edge Computing & Cache</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 12 — Edge Computing & Cache</h1>
    <p class="subtitle">Edge functions, Edge SSR, Cloudflare Workers et cache at the edge</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Concept",
        text: "Quelle est la différence principale entre une « serverless function » (ex: AWS Lambda) et une « edge function » (ex: Cloudflare Workers) ?",
        code: null,
        options: [
          "Les edge functions supportent plus de langages de programmation",
          "Les serverless functions tournent dans quelques régions centrales ; les edge functions s'exécutent sur les POPs du CDN, au plus proche de l'utilisateur, avec un cold start quasi-nul",
          "Les serverless functions sont plus rapides car elles ont plus de mémoire",
          "Les edge functions ne peuvent pas accéder à Internet"
        ],
        answer: 1,
        explanation: "Les serverless functions (Lambda, Cloud Functions) tournent dans des régions spécifiques (eu-west-1, us-east-1). Les edge functions (Workers, Vercel Edge, Deno Deploy) s'exécutent sur les centaines de POPs du CDN dans le monde. Elles ont un cold start de ~0-5ms (vs 100-500ms+ pour Lambda) grâce au runtime V8 isolates, mais avec des contraintes (pas de Node.js complet, limites CPU/mémoire)."
      },
      {
        label: "Concept",
        text: "Qu'est-ce que le « Edge SSR » et comment interagit-il avec le cache ?",
        code: null,
        options: [
          "C'est le rendu HTML effectué directement sur les POPs edge du CDN, permettant de combiner la personnalisation du SSR avec la proximité géographique du CDN, et de stocker le résultat dans le cache local du POP",
          "C'est le rendu CSS sur le serveur d'origine",
          "C'est une technique qui remplace le HTML par du JSON à l'edge",
          "C'est le pré-rendu de pages statiques sur le navigateur"
        ],
        answer: 0,
        explanation: "Le Edge SSR exécute le rendu HTML sur les serveurs edge (POPs). Au lieu de faire un aller-retour vers une région centrale, le HTML est généré au plus proche de l'utilisateur. Le résultat peut être caché localement au POP. Frameworks comme Next.js (edge runtime), Remix, et Nuxt supportent cela. La latence est drastiquement réduite pour le premier octet (TTFB)."
      },
      {
        label: "Prédiction",
        text: "Ce Cloudflare Worker personnalise la réponse en fonction du pays. Le cache sera-t-il efficace ?",
        code: "export default {\n  async fetch(request) {\n    const country = request.cf.country; // 'FR', 'DE', 'US'...\n    const cacheKey = `${request.url}-${country}`;\n    const cache = caches.default;\n    \n    let response = await cache.match(new Request(cacheKey));\n    if (response) return response;\n    \n    // Génère du HTML personnalisé par pays\n    const html = await renderPageForCountry(country);\n    response = new Response(html, {\n      headers: {\n        'Content-Type': 'text/html',\n        'Cache-Control': 's-maxage=3600',\n      }\n    });\n    await cache.put(new Request(cacheKey), response.clone());\n    return response;\n  }\n};",
        options: [
          "Non, car chaque utilisateur a une clé de cache différente",
          "Oui, le cache est efficace : la clé inclut le pays, donc on a ~200 variantes maximum (une par pays), et chaque POP stocke les versions des pays qu'il dessert principalement",
          "Non, car caches.default ne supporte pas les clés personnalisées",
          "Oui, mais seulement pour les utilisateurs aux USA"
        ],
        answer: 1,
        explanation: "La clé de cache URL+pays crée un nombre limité de variantes (~200 pays). Un POP parisien servira principalement des utilisateurs FR : après le premier MISS, toutes les requêtes FR suivantes sont des HIT. Les variantes DE ou US seront rares sur ce POP. C'est beaucoup plus efficace que Vary: User-Agent (des milliers de variantes). La granularité pays est un bon compromis cache/personnalisation."
      },
      {
        label: "Code",
        text: "Ce middleware Next.js utilise l'edge runtime pour un A/B test. Identifiez l'interaction avec le cache.",
        code: "// middleware.ts (Next.js Edge Middleware)\nimport { NextResponse } from 'next/server';\n\nexport const config = { matcher: '/pricing' };\n\nexport function middleware(request) {\n  const bucket = request.cookies.get('ab-bucket')?.value;\n  \n  if (!bucket) {\n    // Nouveau visiteur : assigner aléatoirement\n    const newBucket = Math.random() > 0.5 ? 'A' : 'B';\n    const url = request.nextUrl.clone();\n    url.pathname = `/pricing/${newBucket}`;\n    const response = NextResponse.rewrite(url);\n    response.cookies.set('ab-bucket', newBucket, { maxAge: 86400 });\n    return response;\n  }\n  \n  // Visiteur existant : router vers son bucket\n  const url = request.nextUrl.clone();\n  url.pathname = `/pricing/${bucket}`;\n  return NextResponse.rewrite(url);\n}",
        options: [
          "Le cache ne fonctionne pas avec les middlewares edge",
          "Le middleware rewrite vers /pricing/A ou /pricing/B : ces deux pages internes peuvent être cachées en CDN séparément, tandis que l'URL publique /pricing reste la même pour l'utilisateur",
          "Le cookie empêche tout caching",
          "Le middleware doit purger le cache à chaque requête"
        ],
        answer: 1,
        explanation: "Le middleware edge réécrit l'URL interne (rewrite) sans redirection visible. /pricing/A et /pricing/B sont deux pages distinctes qui peuvent être cachées séparément en CDN (pages statiques ISR). Le middleware tourne à l'edge (~1ms), lit le cookie pour le routage, et le CDN cache les pages de destination. C'est un pattern A/B test performant : logique de routage à l'edge, contenu caché en CDN."
      },
      {
        label: "Pourquoi ?",
        text: "Pourquoi les edge functions utilisent-elles des V8 isolates plutôt que des conteneurs Docker comme les serverless classiques ?",
        code: null,
        options: [
          "Parce que Docker ne fonctionne pas sur les serveurs CDN",
          "Parce que les V8 isolates démarrent en microsecondes (pas de cold start) et consomment très peu de mémoire, permettant d'exécuter des milliers de fonctions sur un même serveur edge avec une latence minimale",
          "Parce que les V8 isolates supportent plus de langages",
          "Parce que Docker est trop coûteux en licences"
        ],
        answer: 1,
        explanation: "Un conteneur Docker prend 50-500ms pour un cold start et consomme 128-512 Mo de RAM. Un V8 isolate (comme dans Cloudflare Workers) démarre en ~5ms et consomme ~128 Ko de RAM. Sur un POP avec des milliers de tenants différents, les isolates permettent une densité et une réactivité impossibles avec des conteneurs. Le compromis : pas d'accès au filesystem, pas de Node.js natif, limites CPU strictes."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      answered = false;
      const q = questions[currentQuestion];
      document.getElementById('progressBar').style.width = ((currentQuestion / questions.length) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${questions.length}`;
      let html = `<div class="card"><p class="question-label">${q.label} — Question ${currentQuestion + 1}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q${currentQuestion}" value="${i}"><span>${opt}</span></label></li>`; });
      html += `</ul><div style="margin-top:1rem;"><button class="btn btn-primary" id="validateBtn" onclick="validate()">Valider</button></div><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
    }
    function validate() {
      if (answered) { nextQuestion(); return; }
      const sel = document.querySelector(`input[name="q${currentQuestion}"]:checked`);
      if (!sel) return;
      answered = true;
      const val = parseInt(sel.value), q = questions[currentQuestion], fb = document.getElementById('feedback'), btn = document.getElementById('validateBtn');
      document.querySelectorAll(`input[name="q${currentQuestion}"]`).forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong><br>${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect</strong> — La bonne réponse était : <em>${q.options[q.answer]}</em><br><br>${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function nextQuestion() { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer'); sc.classList.remove('hidden');
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><p class="score-label">${score === questions.length ? 'Parfait ! Excellente maîtrise !' : score >= 3 ? 'Bon travail ! Révisez les points manqués.' : 'Continuez à étudier, vous progresserez !'}</p><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
