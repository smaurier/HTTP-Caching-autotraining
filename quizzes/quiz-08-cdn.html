<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 08 — CDN & Edge Caching</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 08 — CDN & Edge Caching</h1>
    <p class="subtitle">Points of Presence, edge caching, purging et hiérarchie de cache</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Concept",
        text: "Qu'est-ce qu'un POP (Point of Presence) dans l'architecture d'un CDN ?",
        code: null,
        options: [
          "Un serveur central qui stocke toutes les données",
          "Un emplacement géographique contenant des serveurs edge qui cachent le contenu au plus près des utilisateurs",
          "Un protocole de communication entre les serveurs du CDN",
          "Un algorithme de routage pour les requêtes DNS"
        ],
        answer: 1,
        explanation: "Un POP est un datacenter du CDN situé stratégiquement dans une région géographique. Il contient des serveurs edge qui stockent des copies du contenu. Quand un utilisateur fait une requête, le DNS Anycast le dirige vers le POP le plus proche, réduisant la latence. Les grands CDN comme Cloudflare ont 300+ POPs dans le monde."
      },
      {
        label: "Concept",
        text: "Quelle est la différence entre un « cache purge » et un « cache invalidation » dans un CDN ?",
        code: null,
        options: [
          "Purge et invalidation sont deux termes pour la même opération",
          "Le purge supprime immédiatement le contenu du cache ; l'invalidation marque le contenu comme stale pour qu'il soit revalidé à la prochaine requête",
          "Le purge est automatique, l'invalidation est manuelle",
          "Le purge s'applique aux images, l'invalidation aux fichiers HTML"
        ],
        answer: 1,
        explanation: "Le purge (hard purge) supprime physiquement la ressource de tous les POPs : la prochaine requête ira obligatoirement au serveur d'origine. L'invalidation (soft purge) marque la ressource comme stale : la prochaine requête déclenche une revalidation (304 possible si rien n'a changé). L'invalidation est souvent préférable car elle réduit la charge sur l'origine."
      },
      {
        label: "Prédiction",
        text: "Un CDN avec cache hierarchy (shield) reçoit des requêtes pour une nouvelle URL depuis 3 POPs différents simultanément. Combien de requêtes arrivent au serveur d'origine ?",
        code: "Architecture CDN :\nUtilisateur Paris  → POP Paris  → Shield Frankfurt → Origine\nUtilisateur London → POP London → Shield Frankfurt → Origine\nUtilisateur Madrid → POP Madrid → Shield Frankfurt → Origine\n\n# Les 3 requêtes arrivent quasi-simultanément\n# Aucun POP n'a la ressource en cache\n# Le shield supporte le request collapsing",
        options: [
          "3 requêtes (une par POP)",
          "1 seule requête grâce au request collapsing au niveau du shield",
          "0 requête car le shield génère la réponse",
          "6 requêtes (aller-retour pour chaque POP)"
        ],
        answer: 1,
        explanation: "Le shield (ou mid-tier cache) sert de cache intermédiaire entre les POPs edge et l'origine. Avec le request collapsing (coalescing), quand plusieurs requêtes pour la même URL arrivent simultanément, le shield n'envoie qu'UNE seule requête à l'origine et distribue la réponse à tous les POPs en attente. Cela protège l'origine contre les pics de trafic."
      },
      {
        label: "Code",
        text: "Cette configuration Cloudflare Workers gère le caching. Quel est le comportement pour un utilisateur en France vs au Japon ?",
        code: "// Cloudflare Worker\nexport default {\n  async fetch(request) {\n    const url = new URL(request.url);\n    const cacheKey = new Request(url.toString(), request);\n    const cache = caches.default;\n\n    let response = await cache.match(cacheKey);\n    if (response) {\n      return response; // Cache HIT au POP local\n    }\n\n    response = await fetch(request); // Vers l'origine\n    response = new Response(response.body, response);\n    response.headers.set('Cache-Control', 's-maxage=3600');\n    \n    // Stocke dans le cache du POP local uniquement\n    await cache.put(cacheKey, response.clone());\n    return response;\n  }\n};",
        options: [
          "Les deux utilisateurs reçoivent la même réponse du même POP",
          "Chaque POP a son propre cache : le premier visiteur de chaque POP déclenche un cache MISS vers l'origine, les suivants bénéficient du cache local",
          "Le cache est partagé globalement entre tous les POPs Cloudflare",
          "Seul le POP le plus proche de l'origine met en cache"
        ],
        answer: 1,
        explanation: "caches.default dans Cloudflare Workers est local au POP (data center). Le POP de Paris et le POP de Tokyo ont chacun leur propre cache. Le premier visiteur de chaque POP déclenche un MISS et une requête vers l'origine. Les visiteurs suivants du même POP bénéficient du cache. C'est pourquoi le « cache warming » prend du temps sur un CDN global."
      },
      {
        label: "Pourquoi ?",
        text: "Pourquoi un CDN utilise-t-il des « surrogate keys » (aussi appelés cache tags) plutôt que de purger par URL ?",
        code: null,
        options: [
          "Parce que les URLs sont trop longues pour être traitées efficacement",
          "Parce que les surrogate keys permettent de purger en une seule opération toutes les ressources liées à une entité logique (ex: un produit modifié invalide sa page, ses images et son API), sans connaître toutes les URLs concernées",
          "Parce que les URLs changent trop souvent",
          "Parce que les surrogate keys chiffrent le contenu du cache"
        ],
        answer: 1,
        explanation: "Quand un produit est modifié, il faut invalider sa page produit, sa vignette dans les listes, ses endpoints API, ses images... Lister toutes ces URLs est complexe et fragile. Avec les surrogate keys, chaque réponse est taguée (ex: Surrogate-Key: product-42 category-shoes). Un seul appel « purge tag product-42 » invalide toutes les ressources liées, quelle que soit leur URL."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      answered = false;
      const q = questions[currentQuestion];
      document.getElementById('progressBar').style.width = ((currentQuestion / questions.length) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${questions.length}`;
      let html = `<div class="card"><p class="question-label">${q.label} — Question ${currentQuestion + 1}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q${currentQuestion}" value="${i}"><span>${opt}</span></label></li>`; });
      html += `</ul><div style="margin-top:1rem;"><button class="btn btn-primary" id="validateBtn" onclick="validate()">Valider</button></div><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
    }
    function validate() {
      if (answered) { nextQuestion(); return; }
      const sel = document.querySelector(`input[name="q${currentQuestion}"]:checked`);
      if (!sel) return;
      answered = true;
      const val = parseInt(sel.value), q = questions[currentQuestion], fb = document.getElementById('feedback'), btn = document.getElementById('validateBtn');
      document.querySelectorAll(`input[name="q${currentQuestion}"]`).forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong><br>${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect</strong> — La bonne réponse était : <em>${q.options[q.answer]}</em><br><br>${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function nextQuestion() { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer'); sc.classList.remove('hidden');
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><p class="score-label">${score === questions.length ? 'Parfait ! Excellente maîtrise !' : score >= 3 ? 'Bon travail ! Révisez les points manqués.' : 'Continuez à étudier, vous progresserez !'}</p><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
