<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 11 — SSG & ISR</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 11 — SSG & ISR</h1>
    <p class="subtitle">Static Site Generation, Incremental Static Regeneration et on-demand revalidation</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Concept",
        text: "Quelle est la différence fondamentale entre SSG (Static Site Generation) et ISR (Incremental Static Regeneration) ?",
        code: null,
        options: [
          "SSG génère les pages au build et elles ne changent plus jusqu'au prochain build ; ISR permet de regénérer des pages individuelles après le build, à intervalles définis ou à la demande",
          "SSG est pour les petits sites, ISR pour les grands sites",
          "SSG utilise React, ISR utilise Vue",
          "SSG est côté client, ISR est côté serveur"
        ],
        answer: 0,
        explanation: "SSG pré-génère toutes les pages HTML au moment du build (npm run build). Ces pages sont servies comme des fichiers statiques (ultra-rapide, cacheable indéfiniment). ISR ajoute la capacité de regénérer des pages individuelles en production : soit après un intervalle (revalidate: 60), soit à la demande (on-demand revalidation via API). Pas besoin de rebuild complet."
      },
      {
        label: "Concept",
        text: "Comment fonctionne l'ISR au niveau HTTP/cache ?",
        code: null,
        options: [
          "ISR désactive complètement le cache HTTP",
          "ISR utilise un pattern similaire à stale-while-revalidate : la page en cache est servie immédiatement, puis régénérée en arrière-plan pour la prochaine requête",
          "ISR envoie un WebSocket pour mettre à jour la page en temps réel",
          "ISR invalide le cache navigateur de tous les visiteurs simultanément"
        ],
        answer: 1,
        explanation: "ISR implémente un SWR au niveau page entière : (1) la page statique en cache est servie instantanément ; (2) si le revalidate est expiré, Next.js regénère la page en arrière-plan ; (3) la prochaine requête obtient la version fraîche. L'utilisateur qui déclenche la regénération voit la version stale, le suivant voit la mise à jour. Les headers HTTP générés sont typiquement : Cache-Control: s-maxage=X, stale-while-revalidate."
      },
      {
        label: "Prédiction",
        text: "Une page ISR avec revalidate=60 est demandée à t=0, t=30, t=90, et t=91. Lesquelles déclenchent une regénération ?",
        code: "// pages/products/[id].tsx (Next.js Pages Router)\nexport async function getStaticProps({ params }) {\n  const product = await fetchProduct(params.id);\n  return {\n    props: { product },\n    revalidate: 60, // Regénérer au plus tôt toutes les 60s\n  };\n}\n\n// Timeline des requêtes :\n// t=0s   → Page servie (version build)\n// t=30s  → Page servie\n// t=90s  → Page servie\n// t=91s  → Page servie",
        options: [
          "Seule t=90 déclenche une regénération",
          "t=90 déclenche une regénération en arrière-plan (première requête après expiration du revalidate) ; t=91 sert la nouvelle version si la regénération est terminée",
          "t=30 et t=90 déclenchent des regénérations",
          "Aucune requête ne déclenche de regénération, il faut un rebuild"
        ],
        answer: 1,
        explanation: "A t=0 et t=30, le revalidate (60s) n'est pas expiré : la page en cache est servie sans regénération. A t=90, 60s se sont écoulées : la page stale est servie immédiatement ET une regénération est lancée en arrière-plan. A t=91, si la regénération est terminée (elle prend quelques secondes), la nouvelle version est servie. Sinon, c'est encore la version stale."
      },
      {
        label: "Code",
        text: "Cette API Route Next.js implémente l'on-demand revalidation. Quel est l'avantage par rapport à l'ISR basé sur le temps ?",
        code: "// app/api/revalidate/route.ts\nimport { revalidatePath, revalidateTag } from 'next/cache';\n\nexport async function POST(request) {\n  const { secret, path, tag } = await request.json();\n  \n  if (secret !== process.env.REVALIDATION_SECRET) {\n    return Response.json({ error: 'Invalid secret' }, { status: 401 });\n  }\n\n  if (tag) {\n    revalidateTag(tag);  // Ex: revalidateTag('products')\n  } else if (path) {\n    revalidatePath(path); // Ex: revalidatePath('/products/42')\n  }\n\n  return Response.json({ revalidated: true, now: Date.now() });\n}\n\n// Appelé par un webhook du CMS quand un produit est modifié",
        options: [
          "Aucun avantage, c'est la même chose",
          "L'on-demand revalidation régénère la page exactement quand le contenu change (via webhook CMS), au lieu d'attendre un intervalle potentiellement long — les données sont toujours à jour sans polling inutile",
          "L'on-demand revalidation est plus rapide car elle utilise WebSockets",
          "L'on-demand revalidation fonctionne sans serveur"
        ],
        answer: 1,
        explanation: "Avec revalidate basé sur le temps (ex: 60s), le contenu peut être obsolète jusqu'à 60s. Avec l'on-demand revalidation, le CMS appelle le webhook dès qu'un contenu est modifié, déclenchant une regénération immédiate. revalidateTag('products') invalide toutes les pages qui dépendent du tag 'products'. C'est plus réactif ET plus efficient (pas de regénérations inutiles quand rien ne change)."
      },
      {
        label: "Pourquoi ?",
        text: "Pourquoi l'ISR est-il préférable au SSG pur pour un site e-commerce avec 100 000 produits ?",
        code: null,
        options: [
          "Parce que l'ISR améliore le SEO",
          "Parce que le SSG pur nécessiterait de pré-générer 100 000 pages au build (très long), et tout changement de prix/stock imposerait un rebuild complet ; l'ISR régénère les pages individuellement à la demande",
          "Parce que l'ISR consomme moins de mémoire",
          "Parce que le SSG ne supporte pas les images dynamiques"
        ],
        answer: 1,
        explanation: "SSG pur pour 100k produits : builds de 30+ minutes, et un changement de prix nécessite un rebuild complet. ISR résout ces deux problèmes : (1) on ne pré-génère que les pages les plus populaires au build, les autres sont générées à la première visite (fallback) ; (2) les mises à jour régénèrent uniquement les pages concernées. Le temps de build reste constant, et les données sont quasi-temps réel avec on-demand revalidation."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      answered = false;
      const q = questions[currentQuestion];
      document.getElementById('progressBar').style.width = ((currentQuestion / questions.length) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${questions.length}`;
      let html = `<div class="card"><p class="question-label">${q.label} — Question ${currentQuestion + 1}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q${currentQuestion}" value="${i}"><span>${opt}</span></label></li>`; });
      html += `</ul><div style="margin-top:1rem;"><button class="btn btn-primary" id="validateBtn" onclick="validate()">Valider</button></div><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
    }
    function validate() {
      if (answered) { nextQuestion(); return; }
      const sel = document.querySelector(`input[name="q${currentQuestion}"]:checked`);
      if (!sel) return;
      answered = true;
      const val = parseInt(sel.value), q = questions[currentQuestion], fb = document.getElementById('feedback'), btn = document.getElementById('validateBtn');
      document.querySelectorAll(`input[name="q${currentQuestion}"]`).forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong><br>${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect</strong> — La bonne réponse était : <em>${q.options[q.answer]}</em><br><br>${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function nextQuestion() { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer'); sc.classList.remove('hidden');
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><p class="score-label">${score === questions.length ? 'Parfait ! Excellente maîtrise !' : score >= 3 ? 'Bon travail ! Révisez les points manqués.' : 'Continuez à étudier, vous progresserez !'}</p><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
