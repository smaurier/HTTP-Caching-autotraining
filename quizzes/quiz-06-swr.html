<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 06 — Stale-While-Revalidate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 06 — Stale-While-Revalidate</h1>
    <p class="subtitle">stale-while-revalidate, stale-if-error et stratégies de cache avancées</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Concept",
        text: "Que signifie « stale-while-revalidate=60 » dans un header Cache-Control ?",
        code: null,
        options: [
          "Le cache supprime la ressource 60 secondes après expiration",
          "Pendant 60 secondes après l'expiration de max-age, le cache sert la version périmée immédiatement tout en lançant une revalidation en arrière-plan",
          "Le cache attend 60 secondes avant de revalider",
          "La ressource est considérée fraîche pendant 60 secondes supplémentaires"
        ],
        answer: 1,
        explanation: "stale-while-revalidate (SWR) définit une fenêtre après l'expiration de max-age. Pendant cette fenêtre, le cache sert immédiatement la version périmée (stale) à l'utilisateur pour une réponse instantanée, tout en lançant une requête de revalidation en arrière-plan pour mettre à jour le cache."
      },
      {
        label: "Concept",
        text: "Quelle est la différence entre « stale-while-revalidate » et « stale-if-error » ?",
        code: null,
        options: [
          "stale-while-revalidate sert du contenu périmé pendant la revalidation normale ; stale-if-error sert du contenu périmé uniquement quand le serveur renvoie une erreur (5xx) ou est injoignable",
          "Les deux servent exactement le même objectif",
          "stale-if-error ne fonctionne qu'avec les CDN, pas les navigateurs",
          "stale-while-revalidate est pour les API, stale-if-error pour les pages HTML"
        ],
        answer: 0,
        explanation: "stale-while-revalidate optimise la performance en servant du contenu périmé pendant qu'il se met à jour en arrière-plan. stale-if-error est un filet de sécurité : si le serveur d'origine est en panne (erreur 5xx ou timeout), le cache sert la dernière version connue au lieu d'afficher une erreur. Les deux peuvent être combinés."
      },
      {
        label: "Prédiction",
        text: "La ressource a été mise en cache il y a 90 secondes. Que se passe-t-il lors de la prochaine requête ?",
        code: "Cache-Control: public, max-age=60, stale-while-revalidate=120\n\n# Timeline :\n# t=0s   → Réponse mise en cache\n# t=60s  → max-age expire (ressource \"stale\")\n# t=90s  → Requête du client (maintenant)\n# t=180s → Fin de la fenêtre SWR",
        options: [
          "Le cache renvoie une erreur car max-age est dépassé",
          "Le cache attend la revalidation puis renvoie la nouvelle version",
          "Le cache sert immédiatement la version périmée et lance une revalidation en arrière-plan",
          "Le cache supprime la ressource et force un téléchargement complet"
        ],
        answer: 2,
        explanation: "A t=90s, max-age (60s) est dépassé mais nous sommes dans la fenêtre SWR (60s + 120s = 180s). Le cache sert immédiatement la version stale pour une latence quasi-nulle, tout en envoyant une requête au serveur d'origine en arrière-plan. La prochaine requête bénéficiera de la version fraîche."
      },
      {
        label: "Code",
        text: "Ce Service Worker implémente une stratégie SWR. Quelle est l'issue pour la première et la seconde requête après expiration du cache ?",
        code: "// Service Worker - stratégie stale-while-revalidate\nself.addEventListener('fetch', (event) => {\n  event.respondWith(\n    caches.match(event.request).then((cached) => {\n      const fetchPromise = fetch(event.request).then((response) => {\n        const clone = response.clone();\n        caches.open('v1').then(cache => cache.put(event.request, clone));\n        return response;\n      });\n      return cached || fetchPromise;\n    })\n  );\n});",
        options: [
          "Les deux requêtes reçoivent la version fraîche du réseau",
          "La 1re requête reçoit la version en cache (stale), la 2e reçoit la version mise à jour car le fetch en arrière-plan a actualisé le cache",
          "La 1re requête échoue car le cache est expiré",
          "Les deux requêtes reçoivent la version en cache sans jamais revalider"
        ],
        answer: 1,
        explanation: "Ce code implémente SWR : s'il y a une version en cache (cached), elle est renvoyée immédiatement. En parallèle, fetch() récupère la version fraîche et met à jour le cache. La 1re requête obtient la version stale (rapide), mais le cache est actualisé en arrière-plan. La 2e requête obtiendra la version fraîche stockée."
      },
      {
        label: "Pourquoi ?",
        text: "Pourquoi stale-while-revalidate est-il particulièrement adapté aux API de type « catalogue produit » ou « fil d'actualité » ?",
        code: null,
        options: [
          "Parce que ces API ne changent jamais",
          "Parce que ces API nécessitent une cohérence stricte en temps réel",
          "Parce que ces données tolèrent une légère péremption (quelques secondes de retard sont acceptables) tout en bénéficiant d'une latence quasi-nulle pour l'utilisateur",
          "Parce que SWR est le seul moyen de cacher des réponses JSON"
        ],
        answer: 2,
        explanation: "Un catalogue produit ou un fil d'actualité peut tolérer quelques secondes de retard : voir un prix qui a changé il y a 5 secondes n'est pas critique. En revanche, la réactivité de l'interface est essentielle pour l'UX. SWR offre le meilleur des deux mondes : réponse instantanée + données rafraîchies en arrière-plan. Pour des données critiques (solde bancaire, stock temps réel), no-cache est préférable."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      answered = false;
      const q = questions[currentQuestion];
      document.getElementById('progressBar').style.width = ((currentQuestion / questions.length) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${questions.length}`;
      let html = `<div class="card"><p class="question-label">${q.label} — Question ${currentQuestion + 1}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q${currentQuestion}" value="${i}"><span>${opt}</span></label></li>`; });
      html += `</ul><div style="margin-top:1rem;"><button class="btn btn-primary" id="validateBtn" onclick="validate()">Valider</button></div><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
    }
    function validate() {
      if (answered) { nextQuestion(); return; }
      const sel = document.querySelector(`input[name="q${currentQuestion}"]:checked`);
      if (!sel) return;
      answered = true;
      const val = parseInt(sel.value), q = questions[currentQuestion], fb = document.getElementById('feedback'), btn = document.getElementById('validateBtn');
      document.querySelectorAll(`input[name="q${currentQuestion}"]`).forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong><br>${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect</strong> — La bonne réponse était : <em>${q.options[q.answer]}</em><br><br>${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function nextQuestion() { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer'); sc.classList.remove('hidden');
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><p class="score-label">${score === questions.length ? 'Parfait ! Excellente maîtrise !' : score >= 3 ? 'Bon travail ! Révisez les points manqués.' : 'Continuez à étudier, vous progresserez !'}</p><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
