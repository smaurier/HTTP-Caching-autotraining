<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 13 — Streaming & Transfert Chunked</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 13 — Streaming & Transfert Chunked</h1>
    <p class="subtitle">Chunked Transfer-Encoding, ReadableStream, SSE et impact sur le cache</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Concept",
        text: "Pourquoi le Transfer-Encoding: chunked est-il incompatible avec le header Content-Length ?",
        code: null,
        options: [
          "Parce que Content-Length est un header obsolète",
          "Parce que le serveur ne connaît pas la taille totale au début du transfert chunked — les données sont envoyées par morceaux au fur et à mesure, rendant Content-Length impossible à calculer à l'avance",
          "Parce que chunked utilise une compression spéciale qui change la taille",
          "Les deux sont compatibles et peuvent coexister"
        ],
        answer: 1,
        explanation: "Avec le chunked transfer, le serveur commence à envoyer des données avant de connaître la taille totale (ex: SSR streaming, données générées dynamiquement). Content-Length exige de connaître la taille exacte avant l'envoi. Les deux sont mutuellement exclusifs selon la RFC 7230. Le dernier chunk a une taille de 0, signalant la fin du transfert."
      },
      {
        label: "Concept",
        text: "Comment les réponses streamées (chunked/streaming) interagissent-elles avec les caches HTTP intermédiaires ?",
        code: null,
        options: [
          "Les caches ne peuvent jamais stocker de réponses streamées",
          "Les caches intermédiaires doivent généralement recevoir la réponse complète avant de pouvoir la stocker et la servir ultérieurement, ce qui peut annuler le bénéfice de latence du streaming pour les requêtes suivantes",
          "Les caches transmettent automatiquement les chunks en temps réel",
          "Le streaming désactive automatiquement tout caching"
        ],
        answer: 1,
        explanation: "La plupart des caches HTTP (CDN, reverse proxies) doivent recevoir la réponse entière avant de la stocker. Cela signifie que le premier utilisateur bénéficie du streaming (TTFB rapide), mais le cache ne pourra servir la réponse que quand elle sera complète. Certains CDN avancés (Cloudflare) supportent le « streaming pass-through » : ils transmettent les chunks tout en les accumulant pour le cache."
      },
      {
        label: "Prédiction",
        text: "Ce serveur Node.js envoie une réponse streamée. Le navigateur affiche-t-il le contenu progressivement ?",
        code: "const http = require('http');\n\nhttp.createServer((req, res) => {\n  res.writeHead(200, {\n    'Content-Type': 'text/html',\n    'Transfer-Encoding': 'chunked',\n    'Cache-Control': 'no-cache',\n  });\n\n  res.write('<html><body><h1>Chargement...</h1>');\n\n  setTimeout(() => {\n    res.write('<p>Données partie 1</p>');\n  }, 1000);\n\n  setTimeout(() => {\n    res.write('<p>Données partie 2</p></body></html>');\n    res.end();\n  }, 2000);\n}).listen(3000);",
        options: [
          "Non, le navigateur attend la réponse complète (res.end()) avant d'afficher quoi que ce soit",
          "Oui, le navigateur affiche progressivement : le h1 apparaît immédiatement, puis partie 1 à 1s, puis partie 2 à 2s, grâce au streaming HTML",
          "Non, car Cache-Control: no-cache bloque l'affichage",
          "Oui, mais uniquement avec HTTP/2"
        ],
        answer: 1,
        explanation: "Les navigateurs modernes effectuent un « progressive rendering » du HTML. Chaque chunk reçu est parsé et rendu immédiatement. Le h1 s'affiche dès le premier chunk, puis les paragraphes apparaissent au fur et à mesure. C'est le principe du streaming SSR : l'utilisateur voit du contenu avant que toutes les données ne soient prêtes. Cela fonctionne avec HTTP/1.1 (chunked) et HTTP/2 (data frames)."
      },
      {
        label: "Code",
        text: "Ce code utilise l'API EventSource (SSE). Quel header empêcherait les proxies de bufferiser les événements ?",
        code: "// Serveur Node.js - Server-Sent Events\napp.get('/events', (req, res) => {\n  res.writeHead(200, {\n    'Content-Type': 'text/event-stream',\n    'Cache-Control': 'no-cache',\n    'Connection': 'keep-alive',\n    // Quel header manque pour les proxies ?\n  });\n\n  setInterval(() => {\n    res.write(`data: ${JSON.stringify({ time: Date.now() })}\\n\\n`);\n  }, 1000);\n});\n\n// Client\nconst source = new EventSource('/events');",
        options: [
          "Content-Length: 0",
          "X-Accel-Buffering: no — ce header (compris par Nginx et de nombreux proxies) désactive le buffering, permettant aux événements SSE d'être transmis en temps réel",
          "Transfer-Encoding: identity",
          "Accept-Ranges: none"
        ],
        answer: 1,
        explanation: "Par défaut, Nginx et de nombreux reverse proxies bufferisent les réponses pour les envoyer en bloc, ce qui casse les SSE (les événements arrivent par groupes au lieu de un par un). X-Accel-Buffering: no indique au proxy de transmettre chaque chunk immédiatement. Pour Nginx spécifiquement, on peut aussi configurer proxy_buffering off. Sans cela, les événements temps réel sont retardés."
      },
      {
        label: "Pourquoi ?",
        text: "Pourquoi le streaming SSR avec React Suspense est-il fondamentalement différent du simple chunked transfer encoding en termes de caching ?",
        code: null,
        options: [
          "Il n'y a aucune différence, les deux utilisent le même mécanisme HTTP",
          "Le streaming SSR React insère des scripts inline dans les chunks pour mettre à jour le DOM (remplacement des fallbacks Suspense), ce qui rend chaque réponse un flux HTML+JS unique — plus difficile à cacher de manière partielle mais cacheable dans son intégralité une fois complète",
          "Le streaming SSR ne peut pas être caché du tout",
          "Le chunked transfer est plus rapide que le streaming SSR"
        ],
        answer: 1,
        explanation: "Le streaming SSR React ne se contente pas d'envoyer du HTML par morceaux. Il envoie d'abord le shell avec des fallbacks, puis des scripts inline qui remplacent les fallbacks par le contenu réel (via des tags <template> et du JavaScript de remplacement). La réponse complète est un mélange de HTML et de scripts. Elle peut être cachée dans son intégralité (comme une page SSR normale), mais le caching partiel chunk par chunk n'a pas de sens car les scripts de remplacement dépendent du shell initial."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      answered = false;
      const q = questions[currentQuestion];
      document.getElementById('progressBar').style.width = ((currentQuestion / questions.length) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${questions.length}`;
      let html = `<div class="card"><p class="question-label">${q.label} — Question ${currentQuestion + 1}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q${currentQuestion}" value="${i}"><span>${opt}</span></label></li>`; });
      html += `</ul><div style="margin-top:1rem;"><button class="btn btn-primary" id="validateBtn" onclick="validate()">Valider</button></div><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
    }
    function validate() {
      if (answered) { nextQuestion(); return; }
      const sel = document.querySelector(`input[name="q${currentQuestion}"]:checked`);
      if (!sel) return;
      answered = true;
      const val = parseInt(sel.value), q = questions[currentQuestion], fb = document.getElementById('feedback'), btn = document.getElementById('validateBtn');
      document.querySelectorAll(`input[name="q${currentQuestion}"]`).forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong><br>${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect</strong> — La bonne réponse était : <em>${q.options[q.answer]}</em><br><br>${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function nextQuestion() { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer'); sc.classList.remove('hidden');
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><p class="score-label">${score === questions.length ? 'Parfait ! Excellente maîtrise !' : score >= 3 ? 'Bon travail ! Révisez les points manqués.' : 'Continuez à étudier, vous progresserez !'}</p><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
