<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 15 — Projet Final : Architecture Cache Complète</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 15 — Projet Final</h1>
    <p class="subtitle">Architecture cache complète, debugging et synthèse de tous les concepts</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Concept",
        text: "Pour un site e-commerce avec 50k produits, quel serait le meilleur ensemble de stratégies de cache pour les différents types de ressources ?",
        code: null,
        options: [
          "Cache-Control: max-age=86400 pour tout le site",
          "Assets statiques (JS/CSS/images) : immutable + max-age=1an avec hash ; Pages produit : ISR avec on-demand revalidation ; API panier : no-store, private ; API catalogue : s-maxage=300, stale-while-revalidate=600",
          "no-cache pour tout le site afin de garantir la fraîcheur",
          "CDN désactivé pour éviter les problèmes de cohérence"
        ],
        answer: 1,
        explanation: "Une architecture cache efficace différencie les types de ressources : (1) assets immuables (hash dans le nom) : cache agressif 1 an + immutable ; (2) pages produit : ISR avec revalidation déclenchée par le CMS ; (3) données sensibles/personnelles (panier) : jamais cachées en cache partagé ; (4) catalogue : cache CDN avec SWR pour la performance tout en restant raisonnablement à jour."
      },
      {
        label: "Concept",
        text: "Lors du debugging d'un problème de cache, quels headers de réponse devriez-vous examiner en priorité dans DevTools ?",
        code: null,
        options: [
          "Content-Type et Content-Length uniquement",
          "Cache-Control, Age, X-Cache (ou cf-cache-status), ETag, Vary et Date — ces headers révèlent la politique de cache, l'âge de la réponse, si c'est un HIT/MISS CDN, et les critères de variation",
          "Authorization et Cookie",
          "Server et X-Powered-By"
        ],
        answer: 1,
        explanation: "Pour debugger le cache : Cache-Control (politique configurée), Age (âge en secondes de la réponse dans le cache), X-Cache/cf-cache-status (HIT/MISS/EXPIRED au niveau CDN), ETag (identifiant pour revalidation), Vary (critères de variation), Date (quand la réponse originale a été générée). La combinaison Age + Date permet de calculer quand la réponse expire."
      },
      {
        label: "Prédiction",
        text: "Un développeur voit « cf-cache-status: DYNAMIC » sur ses pages Next.js servies par Cloudflare. Les pages ne sont jamais cachées. Quel est le problème probable ?",
        code: "# Headers de réponse observés :\nHTTP/2 200\ncontent-type: text/html; charset=utf-8\ncache-control: private, no-cache, no-store, max-age=0, must-revalidate\ncf-cache-status: DYNAMIC\nserver: cloudflare\n\n# Configuration Next.js :\n# Les pages utilisent des cookies de session\n# export const dynamic = 'force-dynamic'",
        options: [
          "Cloudflare ne supporte pas Next.js",
          "Les pages ont force-dynamic, ce qui génère Cache-Control: private, no-store — Cloudflare voit ces directives et marque la réponse comme DYNAMIC (non-cacheable). Solution : utiliser ISR ou supprimer force-dynamic pour les pages publiques",
          "Il faut payer Cloudflare Enterprise pour cacher du HTML",
          "cf-cache-status: DYNAMIC est le comportement normal et correct"
        ],
        answer: 1,
        explanation: "force-dynamic force Next.js à générer des headers interdisant le cache. Cloudflare respecte ces headers et marque la réponse DYNAMIC. Pour cacher en CDN : (1) utiliser ISR (revalidate) au lieu de force-dynamic ; (2) ou configurer des Cache Rules Cloudflare pour surcharger les headers ; (3) ou utiliser le stale-while-revalidate côté CDN. Les pages avec cookies de session devraient séparer le contenu public (cacheable) du contenu privé (hydraté côté client)."
      },
      {
        label: "Code",
        text: "Cette configuration Nginx implémente un micro-caching pour une API. Identifiez la stratégie et son bénéfice.",
        code: "# nginx.conf\nproxy_cache_path /tmp/nginx levels=1:2 keys_zone=api:10m\n                 max_size=1g inactive=1m;\n\nserver {\n  location /api/ {\n    proxy_cache api;\n    proxy_cache_valid 200 1s;  # Cache les 200 pendant 1 seconde\n    proxy_cache_lock on;        # Une seule requête à l'origine\n    proxy_cache_use_stale error timeout updating;\n    proxy_cache_background_update on;\n    \n    proxy_pass http://backend;\n    add_header X-Cache-Status $upstream_cache_status;\n  }\n}",
        options: [
          "Cette configuration est inutile car 1 seconde est trop court",
          "C'est du micro-caching : même 1s de cache avec proxy_cache_lock protège le backend contre les pics de trafic (thundering herd), et background_update assure une expérience SWR — une seule requête atteint le backend par seconde maximum",
          "proxy_cache_lock bloque toutes les requêtes",
          "Cette configuration ne fonctionne qu'avec des fichiers statiques"
        ],
        answer: 1,
        explanation: "Le micro-caching (1s) peut sembler insignifiant, mais combiné avec proxy_cache_lock, il est puissant : si 1000 requêtes arrivent simultanément, UNE SEULE atteint le backend, les 999 autres sont servies depuis le cache. proxy_cache_use_stale + background_update implémentent SWR : les requêtes sont servies depuis le cache stale pendant la mise à jour en arrière-plan. C'est une protection critique contre les pics de charge."
      },
      {
        label: "Pourquoi ?",
        text: "Pourquoi est-il crucial d'avoir une stratégie de cache-busting (hash dans les noms de fichiers) même quand on utilise un CDN avec purge instantanée ?",
        code: null,
        options: [
          "Parce que le CDN ne supporte pas la purge de fichiers individuels",
          "Parce que le cache navigateur ne peut pas être purgé à distance : même si le CDN est purgé instantanément, les navigateurs des utilisateurs conservent les anciennes versions jusqu'à l'expiration de max-age — les noms hashés (main.abc123.js) garantissent que le nouveau HTML référence de nouveaux fichiers, contournant le cache navigateur",
          "Parce que les hash améliorent la sécurité",
          "Parce que les CDN sont trop lents pour purger"
        ],
        answer: 1,
        explanation: "Le CDN est sous notre contrôle (purge API). Le navigateur ne l'est pas. Si main.js est caché 1 an dans le navigateur et qu'on publie une mise à jour : (1) sans hash : même après purge CDN, les navigateurs servent l'ancien main.js ; (2) avec hash : le nouveau HTML référence main.xyz789.js (nouvelle URL), le navigateur ne l'a pas en cache et le télécharge. C'est pourquoi les bundlers (Webpack, Vite) ajoutent des hash par défaut."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      answered = false;
      const q = questions[currentQuestion];
      document.getElementById('progressBar').style.width = ((currentQuestion / questions.length) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${questions.length}`;
      let html = `<div class="card"><p class="question-label">${q.label} — Question ${currentQuestion + 1}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q${currentQuestion}" value="${i}"><span>${opt}</span></label></li>`; });
      html += `</ul><div style="margin-top:1rem;"><button class="btn btn-primary" id="validateBtn" onclick="validate()">Valider</button></div><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
    }
    function validate() {
      if (answered) { nextQuestion(); return; }
      const sel = document.querySelector(`input[name="q${currentQuestion}"]:checked`);
      if (!sel) return;
      answered = true;
      const val = parseInt(sel.value), q = questions[currentQuestion], fb = document.getElementById('feedback'), btn = document.getElementById('validateBtn');
      document.querySelectorAll(`input[name="q${currentQuestion}"]`).forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong><br>${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect</strong> — La bonne réponse était : <em>${q.options[q.answer]}</em><br><br>${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function nextQuestion() { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer'); sc.classList.remove('hidden');
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><p class="score-label">${score === questions.length ? 'Parfait ! Excellente maîtrise !' : score >= 3 ? 'Bon travail ! Révisez les points manqués.' : 'Continuez à étudier, vous progresserez !'}</p><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
